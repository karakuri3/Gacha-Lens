name: Gacha ingestion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "10 18 * * *"

jobs:
  upsert:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MARKET_RAW_FEED_SOURCES_JSON: ${{ secrets.MARKET_RAW_FEED_SOURCES_JSON }}
      STOCK_RAW_FEED_SOURCES_JSON: ${{ secrets.STOCK_RAW_FEED_SOURCES_JSON }}
      GACHA_DATA_SOURCE: supabase
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run ingestion
        run: npm run db:upsert-all 2>&1 | tee ingestion.log
      - name: Write summary
        if: always()
        run: |
          echo "## Gacha ingestion" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review queue: /review" >> "$GITHUB_STEP_SUMMARY"
          echo "- Next check: import_issues high/medium items" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload ingestion log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-log
          path: ingestion.log

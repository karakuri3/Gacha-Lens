name: Gacha ingestion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      task:
        description: Ingestion task
        required: true
        default: all
        type: choice
        options:
          - all
          - official
          - market
          - stock
  schedule:
    - cron: "7 * * * *"
    - cron: "17,47 * * * *"
    - cron: "37 * * * *"

jobs:
  upsert:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MARKET_RAW_FEED_SOURCES_JSON: ${{ secrets.MARKET_RAW_FEED_SOURCES_JSON }}
      STOCK_RAW_FEED_SOURCES_JSON: ${{ secrets.STOCK_RAW_FEED_SOURCES_JSON }}
      RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
      RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
      RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      YAHOO_SHOPPING_APP_ID: ${{ secrets.YAHOO_SHOPPING_APP_ID }}
      YAHOO_SHOPPING_FETCH_ENABLED: ${{ secrets.YAHOO_SHOPPING_FETCH_ENABLED }}
      OFFICIAL_DETAIL_FETCH_LIMIT: 60
      OFFICIAL_DETAIL_FETCH_DELAY_MS: 250
      OFFICIAL_TARTS_PAGES_PER_RUN: 4
      OFFICIAL_TARTS_MAX_PAGE: 80
      MARKET_QUERY_CURSOR_MINUTES: 30
      GACHA_DATA_SOURCE: supabase
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Select ingestion task
        id: ingestion
        shell: bash
        env:
          MANUAL_TASK: ${{ inputs.task }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          case "$SCHEDULE" in
            "7 * * * *") task=official ;;
            "17,47 * * * *") task=market ;;
            "37 * * * *") task=stock ;;
            *) task="${MANUAL_TASK:-all}" ;;
          esac
          echo "task=$task" >> "$GITHUB_OUTPUT"
      - name: Run ingestion
        run: |
          set -o pipefail
          npm run db:upsert-all -- --task=${{ steps.ingestion.outputs.task }} 2>&1 | tee ingestion.log
      - name: Clean replaced provisional variants
        if: ${{ steps.ingestion.outputs.task == 'official' || steps.ingestion.outputs.task == 'all' }}
        run: npm run db:cleanup-provisional
      - name: Remove validation-only signal rows
        run: npm run db:cleanup-nonproduction
      - name: Remove irrelevant unlinked market rows
        if: ${{ steps.ingestion.outputs.task == 'market' || steps.ingestion.outputs.task == 'all' }}
        run: npm run db:cleanup-irrelevant-market
      - name: Write summary
        if: always()
        run: |
          echo "## Gacha ingestion" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Task: ${{ steps.ingestion.outputs.task }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review queue: /review" >> "$GITHUB_STEP_SUMMARY"
          echo "- Next check: import_issues high/medium items" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload ingestion log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-log
          path: ingestion.log

name: Gacha ingestion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      task:
        description: Ingestion task
        required: true
        default: market
        type: choice
        options:
          - all
          - official
          - market
          - stock
      mode:
        description: Market collection mode (scheduled runs always write)
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - write
      limit:
        description: Maximum market variants (1-200)
        required: true
        default: "25"
        type: string
      priority:
        description: Market priority (all or 1-5)
        required: true
        default: all
        type: string
      release:
        description: Market release scope
        required: true
        default: all
        type: choice
        options:
          - all
          - released
          - upcoming
      source_scope:
        description: Market source scope
        required: true
        default: planner-apis
        type: choice
        options:
          - planner-apis
          - approved-feeds
          - all
      execute_sources:
        description: Execute configured external sources during dry-run
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "7 * * * *"
    - cron: "17,47 * * * *"
    - cron: "37 * * * *"

jobs:
  upsert:
    concurrency:
      group: gacha-ingestion
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MARKET_RAW_FEED_SOURCES_JSON: ${{ secrets.MARKET_RAW_FEED_SOURCES_JSON }}
      STOCK_RAW_FEED_SOURCES_JSON: ${{ secrets.STOCK_RAW_FEED_SOURCES_JSON }}
      RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
      RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
      RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      YAHOO_SHOPPING_APP_ID: ${{ secrets.YAHOO_SHOPPING_APP_ID }}
      YAHOO_SHOPPING_FETCH_ENABLED: ${{ secrets.YAHOO_SHOPPING_FETCH_ENABLED }}
      OFFICIAL_DETAIL_FETCH_LIMIT: 60
      OFFICIAL_DETAIL_FETCH_DELAY_MS: 250
      OFFICIAL_TARTS_PAGES_PER_RUN: 4
      OFFICIAL_TARTS_MAX_PAGE: 80
      MARKET_QUERY_CURSOR_MINUTES: 30
      GACHA_DATA_SOURCE: supabase
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Select ingestion task
        id: ingestion
        shell: bash
        env:
          MANUAL_TASK: ${{ inputs.task }}
          MANUAL_MODE: ${{ inputs.mode }}
          MANUAL_LIMIT: ${{ inputs.limit }}
          MANUAL_PRIORITY: ${{ inputs.priority }}
          MANUAL_RELEASE: ${{ inputs.release }}
          MANUAL_SOURCE_SCOPE: ${{ inputs.source_scope }}
          MANUAL_EXECUTE_SOURCES: ${{ inputs.execute_sources }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          case "$SCHEDULE" in
            "7 * * * *") task=official ;;
            "17,47 * * * *") task=market ;;
            "37 * * * *") task=stock ;;
            *) task="${MANUAL_TASK:-all}" ;;
          esac
          if [ -n "$SCHEDULE" ]; then
            mode=write
            source_scope=all
            execute_sources=true
          else
            mode="${MANUAL_MODE:-dry-run}"
            source_scope="${MANUAL_SOURCE_SCOPE:-planner-apis}"
            execute_sources="${MANUAL_EXECUTE_SOURCES:-false}"
          fi
          case "${MANUAL_LIMIT:-25}" in ''|*[!0-9]*) limit=25 ;; *) limit="$MANUAL_LIMIT" ;; esac
          case "${MANUAL_PRIORITY:-all}" in all|1|2|3|4|5) priority="${MANUAL_PRIORITY:-all}" ;; *) priority=all ;; esac
          case "$source_scope" in planner-apis|approved-feeds|all) ;; *) source_scope=planner-apis ;; esac
          if [ "$task" = "all" ] && [ "$mode" = "dry-run" ]; then
            echo "::error::The all task writes official and stock data. Select write explicitly, or run the default market dry-run."
            exit 1
          fi
          echo "task=$task" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "limit=$limit" >> "$GITHUB_OUTPUT"
          echo "priority=$priority" >> "$GITHUB_OUTPUT"
          echo "release=${MANUAL_RELEASE:-all}" >> "$GITHUB_OUTPUT"
          echo "source_scope=$source_scope" >> "$GITHUB_OUTPUT"
          echo "execute_sources=$execute_sources" >> "$GITHUB_OUTPUT"
      - name: Run controlled market backfill
        if: ${{ github.event_name == 'workflow_dispatch' && steps.ingestion.outputs.task == 'market' }}
        env:
          BACKFILL_MODE: ${{ steps.ingestion.outputs.mode }}
          BACKFILL_LIMIT: ${{ steps.ingestion.outputs.limit }}
          BACKFILL_PRIORITY: ${{ steps.ingestion.outputs.priority }}
          BACKFILL_RELEASE: ${{ steps.ingestion.outputs.release }}
          BACKFILL_SOURCE_SCOPE: ${{ steps.ingestion.outputs.source_scope }}
          BACKFILL_EXECUTE_SOURCES: ${{ steps.ingestion.outputs.execute_sources }}
        run: |
          set -o pipefail
          args=("--mode=$BACKFILL_MODE" "--limit=$BACKFILL_LIMIT" "--priority=$BACKFILL_PRIORITY" "--release=$BACKFILL_RELEASE" "--source-scope=$BACKFILL_SOURCE_SCOPE")
          if [ "$BACKFILL_MODE" = "dry-run" ] && [ "$BACKFILL_EXECUTE_SOURCES" = "true" ]; then args+=("--execute-sources"); fi
          npm run market:backfill -- "${args[@]}" 2>&1 | tee ingestion.log
      - name: Run ingestion
        if: ${{ github.event_name != 'workflow_dispatch' || steps.ingestion.outputs.task != 'market' }}
        env:
          MARKET_COVERAGE_LIMIT: ${{ steps.ingestion.outputs.limit }}
          MARKET_COVERAGE_PRIORITY: ${{ steps.ingestion.outputs.priority }}
          MARKET_COVERAGE_RELEASE: ${{ steps.ingestion.outputs.release }}
          MARKET_COVERAGE_COOLDOWN_HOURS: 24
          MARKET_SOURCE_SCOPE: ${{ steps.ingestion.outputs.source_scope }}
        run: |
          set -o pipefail
          npm run db:upsert-all -- --task=${{ steps.ingestion.outputs.task }} 2>&1 | tee ingestion.log
      - name: Clean replaced provisional variants
        if: ${{ steps.ingestion.outputs.task == 'official' || steps.ingestion.outputs.task == 'all' }}
        run: npm run db:cleanup-provisional
      - name: Remove validation-only signal rows
        if: ${{ steps.ingestion.outputs.mode == 'write' || github.event_name != 'workflow_dispatch' }}
        run: npm run db:cleanup-nonproduction
      - name: Remove irrelevant unlinked market rows
        if: ${{ (steps.ingestion.outputs.task == 'market' || steps.ingestion.outputs.task == 'all') && (steps.ingestion.outputs.mode == 'write' || github.event_name != 'workflow_dispatch') }}
        run: npm run db:cleanup-irrelevant-market
      - name: Write summary
        if: always()
        run: |
          echo "## Gacha ingestion" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Task: ${{ steps.ingestion.outputs.task }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ steps.ingestion.outputs.mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Market source scope: ${{ steps.ingestion.outputs.source_scope }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review queue: /review" >> "$GITHUB_STEP_SUMMARY"
          echo "- Next check: import_issues high/medium items" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload ingestion log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-log
          path: ingestion.log
